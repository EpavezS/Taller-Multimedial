<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>timon</title>

<style>
body {
  background-color: #F5F4EB;
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px 40px;
}

.logo {
  font-size: 40px;
  font-weight: bold;
  letter-spacing: 3px;
  text-decoration: none;
  color: #827662;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #464138;
  font-size: 16px;
  font-weight: bold;
}

/* GALERÍA */
.galeria {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 900px;
  margin: 50px auto;
}

.galeria img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.galeria img:hover {
  transform: scale(1.05);
}

/* FLECHA */
.flecha-lateral {
  position: fixed;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  background-color: black;
  color: white;
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  text-decoration: none;
  border-radius: 4px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
}

.popup-img {
  display: block;
  margin: auto;
  max-width: 90%;
  max-height: 90%;
  margin-top: 5%;
}

.cerrar {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 40px;
  cursor: pointer;
}

.popup .flecha {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 50px;
  cursor: pointer;
  padding: 20px;
}

.popup .izquierda { left: 20px; }
.popup .derecha { right: 20px; }
</style>

</head>

<body>

<header>
<a href="index.html" class="logo">E|PAVEZ</a>
<nav>
  <a href="index.html">Contacto</a>
  <a href="https://www.instagram.com/epavezs/?hl=es-la" target="_blank">Instagram</a>
</nav>
</header>

<a href="index.html" class="flecha-lateral">‹</a>

<div class="galeria">
  <img src="img/timonclose.PNG" class="item-img">
  <img src="img/timon2.PNG" class="item-img">
  <img src="img/timon3.PNG" class="item-img">
  <img src="img/timon4.PNG" class="item-img">
  <img src="img/timon5.PNG" class="item-img">
  <img src="img/timon6.PNG" class="item-img">
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <span class="cerrar">&times;</span>
  <img class="popup-img" id="imagenGrande">
  <span class="flecha izquierda">‹</span>
  <span class="flecha derecha">›</span>
</div>

<script>
const imagenes = document.querySelectorAll(".item-img");
const popup = document.getElementById("popup");
const popupImg = document.getElementById("imagenGrande");
const cerrar = document.querySelector(".cerrar");
const izquierda = document.querySelector(".izquierda");
const derecha = document.querySelector(".derecha");

let index = 0;

imagenes.forEach((img, i) => {
  img.addEventListener("click", () => {
    popup.style.display = "block";
    popupImg.src = img.src;
    index = i;
  });
});

cerrar.onclick = () => popup.style.display = "none";

function mostrarImagen(i) {
  if (i < 0) i = imagenes.length - 1;
  if (i >= imagenes.length) i = 0;
  popupImg.src = imagenes[i].src;
  index = i;
}

izquierda.onclick = () => mostrarImagen(index - 1);
derecha.onclick = () => mostrarImagen(index + 1);

popup.onclick = (e) => {
  if (e.target === popup) popup.style.display = "none";
};
</script>

</body>
</html>

body {
  background-color: #F5F4EB;
  color: #827662;
  margin: 0;

}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px 40px;
  font-weight: bold;
}

/* LOGO */
.logo {
  font-size: 40px;
  letter-spacing: 3px;
  text-decoration: none; /* quita el subrayado */
  color: #827662;
}

/* LETRAS DE ARRIBA */
nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #464138;
  font-size: 16px;
}

/* GALERIA ESTO DIVIDE LA PAGINA */
.galeria {
  display: grid; /* grilla */
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  padding: 40px;
}

.item {
  text-align: left;
}

.item img {
  width: 100%;
  height: auto;
  cursor: pointer;
}

/* OBRA MAS GRANDE FUERA D ELA GALERIA */


/*AQUÍ VA UN HOVER QUE REALMENTE NO VOY A PONER PQ SE SUPONE Q NO SE HACED EZO*/

/* TITULE ABAJE DE LAS OBRAS */
.titulo {

  font-size: 12px;
  object-fit: cover;
}

.contenedor { /* Clase contenedora */
  display: flex; /* Activa flexbox: organiza los hijos en fila */
  justify-content: space-around; /* Distribuye los elementos con espacio alrededor */
}

.caja { /* Clase para cada bloque */
  background-color: lightgreen; /* Color de fondo */
  padding: 20px; /* Espacio interno */
}
</style>

</div>
</style>
